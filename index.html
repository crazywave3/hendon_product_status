<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>핸든 제품 현황</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #F5F4F0;
      --surface: #FFFFFF;
      --border: #E2E0DA;
      --text-primary: #1A1916;
      --text-secondary: #7A7870;
      --text-muted: #B0AEA8;
      --accent: #1A1916;
    }

    body {
      font-family: 'Noto Sans KR', sans-serif;
      background: var(--bg);
      color: var(--text-primary);
      min-height: 100vh;
      overflow-y: scroll;
      overscroll-behavior-y: none;
    }

    /* ── 헤더 ── */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .header-title {
      padding: 14px 14px 10px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .site-title {
      font-size: 16px;
      font-weight: 700;
      letter-spacing: -0.3px;
      color: var(--text-primary);
      white-space: nowrap;
    }

    .site-title span {
      font-weight: 300;
      font-size: 12px;
      color: var(--text-muted);
      margin-left: 7px;
      letter-spacing: 0.05em;
    }

    .btn-all {
      font-family: 'Noto Sans KR', sans-serif;
      font-size: 11px;
      font-weight: 400;
      padding: 5px 11px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-secondary);
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.15s;
    }
    .btn-all:hover { background: var(--bg); }
    .btn-all.active { background: var(--accent); color: #fff; border-color: var(--accent); }

    /* ── 브랜드 필터 행 ── */
    .filter-row-status {
      display: flex;
      border-bottom: 1px solid var(--border);
      background: #EDECEA;
    }

    .filter-status-inner {
      display: flex;
      width: 100%;
    }

    @media (min-width: 768px) {
      .filter-status-inner {
        width: 50%;
      }
    }

    /* ── 브랜드 필터 행 ── */
    .filter-row-brand {
      display: flex;
      gap: 5px;
      padding: 9px 14px;
      overflow-x: auto;
      scrollbar-width: none;
      -webkit-overflow-scrolling: touch;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
    }
    .filter-row-brand::-webkit-scrollbar { display: none; }

    /* ── 브랜드 칩 ── */
    .chip-brand {
      font-family: 'Noto Sans KR', sans-serif;
      font-size: 12px;
      font-weight: 400;
      padding: 5px 11px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-secondary);
      cursor: pointer;
      white-space: nowrap;
      flex-shrink: 0;
      transition: all 0.15s;
    }
    .chip-brand:hover { background: var(--bg); }
    .chip-brand.active { background: var(--accent); color: #fff; border-color: var(--accent); }

    /* ── 상태 칩 ── */
    .chip-status {
      font-family: 'Noto Sans KR', sans-serif;
      flex: 1;
      padding: 10px 4px;
      border: none;
      border-right: 1px solid var(--border);
      background: transparent;
      color: var(--text-secondary);
      cursor: pointer;
      text-align: center;
      transition: all 0.15s;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
    }
    .chip-status:last-child { border-right: none; }
    .chip-status:hover { background: rgba(0,0,0,0.04); }
    .chip-status.active {
      background: var(--accent);
      color: #fff;
      font-weight: 500;
    }
    .chip-status.active .btn-count { color: #fff !important; }
    .btn-label {
      font-size: 11px;
      white-space: nowrap;
      color: inherit;
    }
    .btn-count {
      font-size: 18px;
      font-weight: 700;
      line-height: 1.2;
    }
    .chip-status[data-status="등록완료"] .btn-count { color: #3A6B12; }
    .chip-status[data-status="등록예정"] .btn-count { color: #8A5010; }
    .chip-status[data-status="등록미정"] .btn-count { color: #888; }



    /* ── 메인 ── */
    main {
      padding: 14px 10px 56px;
      max-width: 1200px;
      margin: 0 auto;
    }

    .brand-section { margin-bottom: 26px; }

    .brand-heading {
      font-size: 11px;
      font-weight: 500;
      color: var(--text-muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 9px;
      padding-left: 2px;
    }

    /* 모바일: 3열 고정 */
    .product-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 7px;
      align-items: start;
    }

    /* 데스크탑: 5열 */
    @media (min-width: 768px) {
      .header-title { padding: 16px 20px 12px; }
      .filter-row-brand { padding: 10px 20px; }
      .filter-row-status { padding: 9px 20px; }
      main { padding: 18px 20px 60px; }
      .product-grid { grid-template-columns: repeat(5, 1fr); gap: 13px; }
      .summary-item { padding: 10px 24px; }
    }

    /* ── 카드 ── */
    .card {
      background: var(--surface);
      border-radius: 9px;
      border: 1px solid var(--border);
      overflow: hidden;
      transition: transform 0.16s, box-shadow 0.16s;
    }
    .card:hover { transform: translateY(-2px); box-shadow: 0 6px 18px rgba(0,0,0,0.07); }



    .card-image {
      width: 100%;
      aspect-ratio: 1 / 1;
      object-fit: cover;
      display: block;
    }

    .img-placeholder {
      width: 100%;
      aspect-ratio: 1 / 1;
      background: #EDECEA;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .img-placeholder svg { width: 28%; height: 28%; opacity: 0.22; }

    .card-body {
      padding: 7px 8px 9px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      height: 75px;
    }

    .card-name {
      font-size: 11px;
      font-weight: 500;
      color: var(--text-primary);
      margin-bottom: 4px;
      line-height: 1.4;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    @media (min-width: 768px) {
      .card-name { font-size: 12px; }
      .card-body { padding: 9px 10px 11px; height: 80px; }
    }

    .badge {
      display: inline-block;
      font-size: 10px;
      font-weight: 500;
      padding: 2px 7px;
      border-radius: 999px;
      line-height: 1.5;
      text-align: center;
    }
    .badge-done  { background: #E6F0DE; color: #3A6B12; }
    .badge-ready { background: #FEF0D6; color: #8A5010; }
    .badge-none  { background: #EBEBEB; color: #666460; }

    .empty {
      text-align: center;
      padding: 40px 0;
      color: var(--text-muted);
      font-size: 13px;
    }

    /* ── 탭 ── */
    .tab-row {
      display: flex;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
    }

    .tab-btn {
      font-family: 'Noto Sans KR', sans-serif;
      font-size: 13px;
      font-weight: 400;
      padding: 12px 20px;
      border: none;
      border-bottom: 2px solid transparent;
      background: transparent;
      color: var(--text-secondary);
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
    }
    .tab-btn:hover { color: var(--text-primary); }
    .tab-btn.active {
      color: var(--text-primary);
      font-weight: 600;
      border-bottom: 2px solid var(--accent);
    }

    /* ── 신제품 플로우 카드 ── */
    .flow-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 7px;
      padding: 14px 10px 56px;
      max-width: 1200px;
      margin: 0 auto;
    }

    @media (min-width: 768px) {
      .flow-grid {
        grid-template-columns: repeat(5, 1fr);
        gap: 13px;
        padding: 18px 20px 60px;
      }
    }

    .flow-card {
      background: var(--surface);
      border-radius: 9px;
      border: 1px solid var(--border);
      overflow: hidden;
      cursor: pointer;
      transition: transform 0.16s, box-shadow 0.16s;
    }
    .flow-card:hover { transform: translateY(-2px); box-shadow: 0 6px 18px rgba(0,0,0,0.07); }

    .flow-card-body {
      padding: 7px 8px 10px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .flow-card-name {
      font-size: 11px;
      font-weight: 500;
      color: var(--text-primary);
      line-height: 1.4;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    @media (min-width: 768px) {
      .flow-card-name { font-size: 12px; }
      .flow-card-body { padding: 9px 10px 11px; }
    }

    /* 단계 점 */
    .flow-dots {
      display: flex;
      gap: 3px;
      flex-wrap: wrap;
    }

    .flow-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #DEDDD9;
      flex-shrink: 0;
      transition: background 0.2s;
    }
    .flow-dot.done { background: #5AA830; }
    .flow-dot.current { background: #E09020; }

    .flow-step-label {
      font-size: 10px;
      color: var(--text-primary);
      line-height: 1.3;
    }

    /* ── 팝업 모달 ── */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.45);
      z-index: 500;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .modal-overlay.open { display: flex; }

    .modal {
      background: var(--surface);
      border-radius: 14px;
      width: 100%;
      max-width: 420px;
      max-height: 90vh;
      overflow-y: auto;
      box-shadow: 0 20px 60px rgba(0,0,0,0.2);
    }

    .modal-header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 16px 16px 12px;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      background: var(--surface);
    }

    .modal-thumb {
      width: 48px;
      height: 48px;
      border-radius: 6px;
      object-fit: cover;
      background: #EDECEA;
      flex-shrink: 0;
    }

    .modal-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--text-primary);
      flex: 1;
    }

    .modal-brand {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 2px;
    }

    .modal-close {
      background: none;
      border: none;
      cursor: pointer;
      padding: 4px;
      color: var(--text-muted);
      font-size: 18px;
      line-height: 1;
      flex-shrink: 0;
    }
    .modal-close:hover { color: var(--text-primary); }

    .modal-steps {
      padding: 12px 16px 20px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .modal-step {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 12px;
      border-radius: 8px;
      border: 1px solid var(--border);
      cursor: pointer;
      transition: all 0.15s;
      background: var(--surface);
    }
    .modal-step:hover { background: var(--bg); }

    .modal-step.done {
      background: #F0F7EB;
      border-color: #C5DEB0;
    }
    .modal-step.current {
      background: #FEF6E4;
      border-color: #F5C842;
    }

    .modal-step-num {
      width: 26px;
      height: 26px;
      border-radius: 50%;
      background: #EDECEA;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 600;
      color: var(--text-muted);
      flex-shrink: 0;
    }
    .modal-step.done .modal-step-num {
      background: #5AA830;
      color: #fff;
    }
    .modal-step.current .modal-step-num {
      background: #E09020;
      color: #fff;
    }

    .modal-step-name {
      font-size: 13px;
      color: var(--text-primary);
      flex: 1;
    }
    .modal-step.done .modal-step-name { color: #3A6B12; }
    .modal-step.current .modal-step-name { color: #8A5010; font-weight: 500; }

    .modal-step-icon {
      font-size: 14px;
      color: var(--text-muted);
    }
    .modal-step.done .modal-step-icon { color: #5AA830; }

    /* ── 검색창 공통 ── */
    .search-box {
      display: flex;
      align-items: center;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 4px 10px;
      gap: 5px;
    }
    .search-box svg { flex-shrink: 0; opacity: 0.35; }
    .search-input {
      font-family: 'Noto Sans KR', sans-serif;
      font-size: 16px;
      border: none;
      background: transparent;
      outline: none;
      color: var(--text-primary);
      width: 120px;
    }

    /* 데스크탑 검색창만 별도 스타일 */
    .search-desktop .search-input {
      font-size: 12px;
      width: 152px;
    }
    .search-desktop {
      padding: 5px 10px;
    }
    .search-clear {
      background: none;
      border: none;
      cursor: pointer;
      padding: 0;
      display: none;
      align-items: center;
      opacity: 0.35;
      flex-shrink: 0;
    }
    .search-clear:hover { opacity: 0.7; }
    .search-clear.visible { display: flex; }

    /* 모바일: 필터 위에 별도 행 */
    .search-row-mobile {
      display: flex;
      padding: 8px 14px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      transition: max-height 0.2s ease, opacity 0.2s ease, padding 0.2s ease;
      max-height: 60px;
      overflow: hidden;
    }
    .search-row-mobile.hidden-scroll {
      max-height: 0;
      opacity: 0;
      padding-top: 0;
      padding-bottom: 0;
    }
    .search-row-mobile .search-box { flex: 1; }
    .search-row-mobile .search-input { width: 100%; }

    /* 데스크탑: 브랜드 필터 행 오른쪽 */
    .search-row-mobile { display: flex; }
    @media (min-width: 768px) {
      .search-row-mobile { display: none; }
      .filter-row-brand { display: flex; align-items: center; gap: 5px; }
      .search-desktop {
        display: flex !important;
        flex-shrink: 0;
        padding-left: 4px;
      }
    }
  </style>
</head>
<body>

<header>
  <div class="header-title">
    <p class="site-title">핸든 제품 현황<span>Hendon</span></p>
    <button class="btn-all" id="btnAll">핸든 제품 전체보기</button>
  </div>

  <!-- 탭 -->
  <div class="tab-row">
    <button class="tab-btn active" id="tabProduct" onclick="switchTab('product')">제품 현황</button>
    <button class="tab-btn" id="tabFlow" onclick="switchTab('flow')">신제품 플로우</button>
  </div>

  <!-- 제품현황 필터 (탭에 따라 숨김) -->
  <div id="productFilters">
    <!-- 모바일 검색창 (필터 위) -->
    <div class="search-row-mobile" id="searchRowMobile">
      <div class="search-box">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none"><circle cx="11" cy="11" r="7" stroke="#666" stroke-width="1.8"/><path d="M16.5 16.5L21 21" stroke="#666" stroke-width="1.8" stroke-linecap="round"/></svg>
        <input class="search-input" id="searchInputMobile" type="text" placeholder="제품명 검색 (2자 이상)" />
        <button class="search-clear" id="searchClearMobile" aria-label="검색 초기화">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M18 6L6 18M6 6l12 12" stroke="#666" stroke-width="1.8" stroke-linecap="round"/></svg>
        </button>
      </div>
    </div>

    <div class="filter-row-brand" id="brandGroup"></div>

    <div class="filter-row-status">
      <div class="filter-status-inner" id="statusGroup">
        <button class="chip-status" data-status="all"><span class="btn-label">전체</span><span class="btn-count" id="cnt-all"></span></button>
        <button class="chip-status active" data-status="등록완료"><span class="btn-label">등록완료</span><span class="btn-count" id="cnt-done"></span></button>
        <button class="chip-status" data-status="등록예정"><span class="btn-label">등록예정(재고있음)</span><span class="btn-count" id="cnt-ready"></span></button>
        <button class="chip-status" data-status="등록미정"><span class="btn-label">등록미정(재고없음)</span><span class="btn-count" id="cnt-none"></span></button>
      </div>
    </div>
  </div>
</header>

<!-- 제품 현황 섹션 -->
<div id="productSection">
  <main id="main"></main>
</div>

<!-- 신제품 플로우 섹션 -->
<div id="flowSection">
  <div class="flow-grid" id="flowGrid"></div>
</div>

<!-- 팝업 모달 -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
  <div class="modal" id="modal">
    <div class="modal-header">
      <img class="modal-thumb" id="modalThumb" src="" alt="" />
      <div>
        <p class="modal-title" id="modalTitle"></p>
        <p class="modal-brand" id="modalBrand"></p>
      </div>
      <button class="modal-close" onclick="closeModalDirect()">✕</button>
    </div>
    <div class="modal-steps" id="modalSteps"></div>
  </div>
</div>

<script>
/* ================================================================
   ★ 데이터 수정 가이드 ★

   [ 상태(status) 값은 아래 세 가지만 사용 ]
     '등록완료'   → 초록 뱃지
     '등록예정'   → 주황 뱃지  (재고있음)
     '등록미정'   → 회색 뱃지  (재고없음)

   [ 제품 추가 ]
     { brand: '브랜드명', name: '제품명', status: '등록완료', image: '제품_데이터/폴더/파일.jpg' },

   [ 상태 변경 ]
     status 값만 바꾸면 색상·뱃지 자동 변경됩니다.

   [ 저장 후 브라우저 새로고침하면 바로 반영됩니다 ]
================================================================ */
const PRODUCTS = [
  { brand: '데이세븐', name: '가위형집게', status: '등록완료', image: '제품_데이터/01_데이세븐/01_등록완료/001_가위형집게.jpg' },
  { brand: '데이세븐', name: '미니국자_블랙', status: '등록완료', image: '제품_데이터/01_데이세븐/01_등록완료/002_미니국자_블랙.jpg' },
  { brand: '데이세븐', name: '미니국자_그레이', status: '등록완료', image: '제품_데이터/01_데이세븐/01_등록완료/003_미니국자_그레이.jpg' },
  { brand: '데이세븐', name: '스탠딩집게_24cm', status: '등록완료', image: '제품_데이터/01_데이세븐/01_등록완료/004_스탠딩집게_24cm.jpg' },
  { brand: '데이세븐', name: '스탠딩집게_30cm', status: '등록완료', image: '제품_데이터/01_데이세븐/01_등록완료/005_스탠딩집게_30cm.jpg' },

  '등록완료': { cls: 'badge-done',  label: '등록완료' },
  '등록예정': { cls: 'badge-ready', label: '등록예정(재고있음)' },
  '등록미정': { cls: 'badge-none',  label: '등록미정(재고없음)' },
};

/* 첫 화면 기본값: 데이세븐 + 등록완료 */
let activeBrand  = '데이세븐';
let activeStatus = '등록완료';
let searchQuery  = '';

const brands = [...new Set(PRODUCTS.map(p => p.brand))];

/* 브랜드별 전체 집계 (상태 필터와 무관하게 항상 고정) */
function getBrandSummary(brand) {
  const base = brand === 'all' ? PRODUCTS : PRODUCTS.filter(p => p.brand === brand);
  return {
    total: base.length,
    done:  base.filter(p => p.status === '등록완료').length,
    ready: base.filter(p => p.status === '등록예정').length,
    none:  base.filter(p => p.status === '등록미정').length,
  };
}

/* 브랜드 칩 생성 (전체 제외) */
const brandGroup = document.getElementById('brandGroup');
brands.map(b => ({ val: b, label: b }))
  .forEach(({ val, label }) => {
    const btn = document.createElement('button');
    btn.className = 'chip-brand' + (val === activeBrand ? ' active' : '');
    btn.dataset.brand = val;
    btn.textContent = label;
    brandGroup.appendChild(btn);
  });

/* 데스크탑 검색창을 브랜드 칩 뒤에 추가 */
brandGroup.insertAdjacentHTML('beforeend', `
  <div class="search-box search-desktop" style="display:none;">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none"><circle cx="11" cy="11" r="7" stroke="#666" stroke-width="1.8"/><path d="M16.5 16.5L21 21" stroke="#666" stroke-width="1.8" stroke-linecap="round"/></svg>
    <input class="search-input" id="searchInputDesktop" type="text" placeholder="제품명 검색 (2자 이상)" />
    <button class="search-clear" id="searchClearDesktop" aria-label="검색 초기화">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M18 6L6 18M6 6l12 12" stroke="#666" stroke-width="1.8" stroke-linecap="round"/></svg>
    </button>
  </div>
`);

/* 전체보기 버튼 */
function clearSearch() {
  searchQuery = '';
  document.getElementById('searchInputMobile').value = '';
  document.getElementById('searchInputDesktop').value = '';
  document.getElementById('searchClearMobile').classList.remove('visible');
  document.getElementById('searchClearDesktop').classList.remove('visible');
}

document.getElementById('btnAll').addEventListener('click', () => {
  activeBrand = 'all';
  activeStatus = 'all';
  clearSearch();
  brandGroup.querySelectorAll('.chip-brand').forEach(c => c.classList.remove('active'));
  document.getElementById('statusGroup').querySelectorAll('.chip-status').forEach(c => c.classList.remove('active'));
  document.getElementById('btnAll').classList.add('active');
  window.scrollTo({ top: 0 });
  renderSummary();
  renderCards();
});

brandGroup.addEventListener('click', e => {
  const chip = e.target.closest('[data-brand]');
  if (!chip) return;
  activeBrand = chip.dataset.brand;
  activeStatus = '등록완료';
  clearSearch();
  brandGroup.querySelectorAll('.chip-brand').forEach(c => c.classList.remove('active'));
  chip.classList.add('active');
  document.getElementById('btnAll').classList.remove('active');
  document.getElementById('statusGroup').querySelectorAll('.chip-status').forEach(c => c.classList.remove('active'));
  document.querySelector('.chip-status[data-status="등록완료"]').classList.add('active');
  window.scrollTo({ top: 0 });
  renderSummary();
  renderCards();
});

document.getElementById('statusGroup').addEventListener('click', e => {
  const chip = e.target.closest('[data-status]');
  if (!chip) return;
  activeStatus = chip.dataset.status;
  document.getElementById('statusGroup').querySelectorAll('.chip-status').forEach(c => c.classList.remove('active'));
  chip.classList.add('active');
  window.scrollTo({ top: 0 });
  renderCards();
});

/* 버튼에 숫자 표시: 브랜드 기준 고정, 상태 필터 무관 */
function renderSummary() {
  const s = getBrandSummary(activeBrand);
  document.getElementById('cnt-all').textContent   = s.total;
  document.getElementById('cnt-done').textContent  = s.done;
  document.getElementById('cnt-ready').textContent = s.ready;
  document.getElementById('cnt-none').textContent  = s.none;
}

function placeholder() {
  return `<div class="img-placeholder"><svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
    <rect x="3" y="3" width="18" height="18" rx="2" stroke="#888" stroke-width="1.2"/>
    <circle cx="8.5" cy="8.5" r="1.5" fill="#888"/>
    <path d="M3 16l5-5 4 4 3-3 6 6" stroke="#888" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
  </svg></div>`;
}

function cardHTML(p) {
  const meta = STATUS_META[p.status] || STATUS_META['등록미정'];
  const imgSrc = p.image ? p.image.replace(/ /g, '%20') : null;
  const img  = imgSrc
    ? `<img class="card-image" src="${imgSrc}" alt="${p.name}" loading="lazy" />`
    : placeholder();
  return `<div class="card">${img}<div class="card-body">
    <p class="card-name">${p.name}</p>
    <span class="badge ${meta.cls}">${meta.label}</span>
  </div></div>`;
}

function filtered() {
  return PRODUCTS.filter(p =>
    (activeBrand  === 'all' || p.brand  === activeBrand) &&
    (activeStatus === 'all' || p.status === activeStatus)
  );
}

function renderCards() {
  const mainEl = document.getElementById('main');

  if (activeBrand !== 'all') {
    let data = filteredWithSearch();
    if (activeStatus === '등록완료') data = [...data].reverse();
    mainEl.innerHTML = data.length
      ? `<div class="product-grid">${data.map(cardHTML).join('')}</div>`
      : '<div class="empty">해당하는 제품이 없습니다</div>';
    return;
  }

  const html = brands.map(b => {
    let data = PRODUCTS.filter(p =>
      p.brand === b && (activeStatus === 'all' || p.status === activeStatus)
    );
    if (searchQuery.length >= 2) {
      data = data.filter(p => p.name.includes(searchQuery));
    }
    if (activeStatus === '등록완료') data = [...data].reverse();
    if (!data.length) return '';
    return `<div class="brand-section">
      <p class="brand-heading">${b}</p>
      <div class="product-grid">${data.map(cardHTML).join('')}</div>
    </div>`;
  }).join('');

  mainEl.innerHTML = html || '<div class="empty">해당하는 제품이 없습니다</div>';
}

renderSummary();
renderCards();

/* ================================================================
   ★ 신제품 플로우 데이터 ★
   currentStep: 현재 진행 단계 (1~9)
================================================================ */
const FLOW_PRODUCTS = [
  { brand: '데이세븐', name: '옴니팟',          code: 'DS001', currentStep: 2, image: '제품_데이터/99_신제품_플로우/001_옴니팟.jpg' },
  { brand: '데이세븐', name: '일자형_반찬통',   code: 'DS002', currentStep: 4, image: '제품_데이터/99_신제품_플로우/002_일자형_반찬통.jpg' },
  { brand: '데이세븐', name: '사각도마볼',       code: 'DS003', currentStep: 6, image: '제품_데이터/99_신제품_플로우/003_사각도마볼.jpg' },
  { brand: '데이세븐', name: '프리미엄믹싱볼',  code: 'DS004', currentStep: 3, image: '제품_데이터/99_신제품_플로우/004_프리미엄믹싱볼.jpg' },
  { brand: '데이세븐', name: '이지그립_믹싱볼', code: 'DS005', currentStep: 7, image: '제품_데이터/99_신제품_플로우/005_이지그립_믹싱볼.jpg' },
];

const FLOW_STEPS = [
  '중국공장 신제품발견',
  '샘플수령',
  '사진촬영 / 상세페이지',
  '한글표시사항',
  '중국발주',
  '선적',
  '그라첸 입고',
  '품목등록 / 특별단가',
  '스토어 입점',
];

/* 탭 전환 */
function switchTab(tab) {
  if (tab === 'product') {
    document.getElementById('productSection').style.display = 'block';
    document.getElementById('flowSection').style.display = 'none';
    document.getElementById('productFilters').style.display = 'block';
    document.getElementById('tabProduct').classList.add('active');
    document.getElementById('tabFlow').classList.remove('active');
    document.getElementById('btnAll').style.display = '';
  } else {
    document.getElementById('productSection').style.display = 'none';
    document.getElementById('flowSection').style.display = 'block';
    document.getElementById('productFilters').style.display = 'none';
    document.getElementById('tabProduct').classList.remove('active');
    document.getElementById('tabFlow').classList.add('active');
    document.getElementById('btnAll').style.display = 'none';
    renderFlow();
  }
  window.scrollTo({ top: 0 });
}

/* 플로우 카드 렌더 */
function renderFlow() {
  const grid = document.getElementById('flowGrid');
  if (!FLOW_PRODUCTS.length) {
    grid.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:60px 0;color:var(--text-muted);font-size:13px">진행 중인 신제품이 없습니다</div>';
    return;
  }

  grid.innerHTML = FLOW_PRODUCTS.map((p, idx) => {
    const imgSrc = p.image ? p.image.replace(/ /g, '%20') : null;
    const imgEl = imgSrc
      ? `<img class="card-image" src="${imgSrc}" alt="${p.name}" loading="lazy" />`
      : `<div class="img-placeholder"><svg viewBox="0 0 24 24" fill="none"><rect x="3" y="3" width="18" height="18" rx="2" stroke="#888" stroke-width="1.2"/><circle cx="8.5" cy="8.5" r="1.5" fill="#888"/><path d="M3 16l5-5 4 4 3-3 6 6" stroke="#888" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/></svg></div>`;

    const dots = Array.from({length: 9}, (_, i) => {
      const step = i + 1;
      const cls = step < p.currentStep ? 'done' : step === p.currentStep ? 'current' : '';
      return `<div class="flow-dot ${cls}"></div>`;
    }).join('');

    const stepLabel = p.currentStep <= 9
      ? `${p.currentStep}단계 · ${FLOW_STEPS[p.currentStep - 1]}`
      : '완료';

    return `<div class="flow-card" onclick="openModal(${idx})">
      ${imgEl}
      <div class="flow-card-body">
        <p class="flow-card-name">${p.name}</p>
        <div class="flow-dots">${dots}</div>
        <p class="flow-step-label">${stepLabel}</p>
      </div>
    </div>`;
  }).join('');
}

/* 모달 열기 */
let currentModalIdx = -1;

function openModal(idx) {
  currentModalIdx = idx;
  const p = FLOW_PRODUCTS[idx];
  const imgSrc = p.image ? p.image.replace(/ /g, '%20') : null;

  const thumb = document.getElementById('modalThumb');
  if (imgSrc) {
    thumb.src = imgSrc;
    thumb.style.display = 'block';
  } else {
    thumb.style.display = 'none';
  }

  document.getElementById('modalTitle').textContent = p.name;
  document.getElementById('modalBrand').textContent = p.brand + ' · ' + p.code;
  renderModalSteps(p);
  document.getElementById('modalOverlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function renderModalSteps(p) {
  const stepsEl = document.getElementById('modalSteps');
  stepsEl.innerHTML = FLOW_STEPS.map((name, i) => {
    const step = i + 1;
    const cls = step < p.currentStep ? 'done' : step === p.currentStep ? 'current' : '';
    const icon = step < p.currentStep ? '✓' : step === p.currentStep ? '▶' : '';
    return `<div class="modal-step ${cls}" onclick="setStep(${step})">
      <div class="modal-step-num">${step}</div>
      <div class="modal-step-name">${name}</div>
      <div class="modal-step-icon">${icon}</div>
    </div>`;
  }).join('');
}

/* 단계 변경 */
function setStep(step) {
  if (currentModalIdx < 0) return;
  FLOW_PRODUCTS[currentModalIdx].currentStep = step;
  renderModalSteps(FLOW_PRODUCTS[currentModalIdx]);
  renderFlow();
}

/* 모달 닫기 */
function closeModal(e) {
  if (e.target === document.getElementById('modalOverlay')) closeModalDirect();
}
function closeModalDirect() {
  document.getElementById('modalOverlay').classList.remove('open');
  document.body.style.overflow = '';
  currentModalIdx = -1;
}

/* ── 검색 ── */
function syncSearch(val) {
  searchQuery = val.trim();
  const clearM = document.getElementById('searchClearMobile');
  const clearD = document.getElementById('searchClearDesktop');
  clearM.classList.toggle('visible', val.length > 0);
  clearD.classList.toggle('visible', val.length > 0);
  renderCards();
}

function filteredWithSearch() {
  let data = PRODUCTS.filter(p =>
    (activeBrand  === 'all' || p.brand  === activeBrand) &&
    (activeStatus === 'all' || p.status === activeStatus)
  );
  if (searchQuery.length >= 2) {
    data = data.filter(p => p.name.includes(searchQuery));
  }
  return data;
}

/* 검색 입력 이벤트 - 모바일 */
document.getElementById('searchInputMobile').addEventListener('input', e => {
  document.getElementById('searchInputDesktop').value = e.target.value;
  syncSearch(e.target.value);
});
document.getElementById('searchClearMobile').addEventListener('click', () => {
  document.getElementById('searchInputMobile').value = '';
  document.getElementById('searchInputDesktop').value = '';
  syncSearch('');
});

/* 검색 입력 이벤트 - 데스크탑 */
document.getElementById('searchInputDesktop').addEventListener('input', e => {
  document.getElementById('searchInputMobile').value = e.target.value;
  syncSearch(e.target.value);
});
document.getElementById('searchClearDesktop').addEventListener('click', () => {
  document.getElementById('searchInputMobile').value = '';
  document.getElementById('searchInputDesktop').value = '';
  syncSearch('');
});

/* 모바일: 맨 위일 때만 검색창 표시 */
const searchRowMobile = document.getElementById('searchRowMobile');
function handleSearchRowVisibility() {
  if (window.innerWidth >= 768) return;
  if (window.scrollY > 10) {
    searchRowMobile.classList.add('hidden-scroll');
  } else {
    searchRowMobile.classList.remove('hidden-scroll');
  }
}
window.addEventListener('scroll', handleSearchRowVisibility, { passive: true });
window.addEventListener('resize', handleSearchRowVisibility);
let startY = 0;
let startScrollY = 0;
document.addEventListener('touchstart', e => {
  startY = e.touches[0].clientY;
  startScrollY = window.scrollY;
}, { passive: false });

document.addEventListener('touchmove', e => {
  const y = e.touches[0].clientY;
  const deltaY = y - startY;
  if (deltaY > 0 && startScrollY === 0) {
    e.preventDefault();
  }
  if (deltaY > 0 && window.scrollY <= 0) {
    e.preventDefault();
  }
}, { passive: false });

/* HTML 요소에도 overscroll 방지 */
document.documentElement.style.overscrollBehavior = 'none';
document.body.style.overscrollBehavior = 'none';
</script>
</body>
</html>
