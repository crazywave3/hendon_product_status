<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>핸든 제품 현황</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #F5F4F0;
      --surface: #FFFFFF;
      --border: #E2E0DA;
      --text-primary: #1A1916;
      --text-secondary: #7A7870;
      --text-muted: #B0AEA8;
      --accent: #1A1916;
    }

    body {
      font-family: 'Noto Sans KR', sans-serif;
      background: var(--bg);
      color: var(--text-primary);
      min-height: 100vh;
      overflow-y: scroll;
    }

    /* ── 헤더 ── */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .header-title {
      padding: 14px 14px 10px;
      border-bottom: 1px solid var(--border);
    }

    .site-title {
      font-size: 16px;
      font-weight: 700;
      letter-spacing: -0.3px;
      color: var(--text-primary);
    }

    .site-title span {
      font-weight: 300;
      font-size: 12px;
      color: var(--text-muted);
      margin-left: 7px;
      letter-spacing: 0.05em;
    }

    /* ── 브랜드 필터 행 ── */
    .filter-row-brand {
      display: flex;
      gap: 5px;
      padding: 9px 14px;
      overflow-x: auto;
      scrollbar-width: none;
      -webkit-overflow-scrolling: touch;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
    }
    .filter-row-brand::-webkit-scrollbar { display: none; }

    /* ── 상태 필터 행 ── */
    .filter-row-status {
      display: flex;
      border-bottom: 1px solid var(--border);
      background: #EDECEA;
    }

    .filter-status-inner {
      display: flex;
      width: 100%;
    }

    @media (min-width: 768px) {
      .filter-status-inner {
        width: 50%;
      }
    }

    /* ── 브랜드 칩 ── */
    .chip-brand {
      font-family: 'Noto Sans KR', sans-serif;
      font-size: 12px;
      font-weight: 400;
      padding: 5px 11px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-secondary);
      cursor: pointer;
      white-space: nowrap;
      flex-shrink: 0;
      transition: all 0.15s;
    }
    .chip-brand:hover { background: var(--bg); }
    .chip-brand.active { background: var(--accent); color: #fff; border-color: var(--accent); }

    /* ── 상태 칩 ── */
    .chip-status {
      font-family: 'Noto Sans KR', sans-serif;
      font-size: 12px;
      font-weight: 400;
      flex: 1;
      padding: 8px 4px;
      border: none;
      border-right: 1px solid var(--border);
      background: transparent;
      color: var(--text-secondary);
      cursor: pointer;
      white-space: nowrap;
      text-align: center;
      transition: all 0.15s;
    }
    .chip-status:last-child { border-right: none; }
    .chip-status:hover { background: rgba(0,0,0,0.04); }
    .chip-status.active {
      background: var(--surface);
      color: var(--text-primary);
      font-weight: 500;
      border-bottom: 2px solid var(--accent);
    }

    /* ── 요약 바 ── */
    .summary-bar {
      display: flex;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
    }

    .summary-inner {
      display: flex;
      width: 100%;
    }

    @media (min-width: 768px) {
      .summary-inner {
        width: 50%;
      }
    }

    .summary-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      flex: 1;
      padding: 8px 4px;
      border-right: 1px solid var(--border);
      gap: 2px;
    }
    .summary-item:last-child { border-right: none; }

    .summary-label {
      font-size: 11px;
      color: var(--text-muted);
      white-space: nowrap;
    }

    .summary-count {
      font-size: 16px;
      font-weight: 700;
      color: var(--text-primary);
      line-height: 1.3;
    }

    .summary-item.done .summary-count  { color: #3A6B12; }
    .summary-item.ready .summary-count { color: #8A5010; }
    .summary-item.none .summary-count  { color: #888; }

    /* ── 메인 ── */
    main {
      padding: 14px 10px 56px;
      max-width: 1200px;
      margin: 0 auto;
    }

    .brand-section { margin-bottom: 26px; }

    .brand-heading {
      font-size: 11px;
      font-weight: 500;
      color: var(--text-muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 9px;
      padding-left: 2px;
    }

    /* 모바일: 3열 고정 */
    .product-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 7px;
      align-items: start;
    }

    /* 데스크탑: 5열 */
    @media (min-width: 768px) {
      .header-title { padding: 16px 20px 12px; }
      .filter-row-brand { padding: 10px 20px; }
      .filter-row-status { padding: 9px 20px; }
      main { padding: 18px 20px 60px; }
      .product-grid { grid-template-columns: repeat(5, 1fr); gap: 13px; }
      .summary-item { padding: 10px 24px; }
    }

    /* ── 카드 ── */
    .card {
      background: var(--surface);
      border-radius: 9px;
      border: 1px solid var(--border);
      overflow: hidden;
      transition: transform 0.16s, box-shadow 0.16s;
    }
    .card:hover { transform: translateY(-2px); box-shadow: 0 6px 18px rgba(0,0,0,0.07); }



    .card-image {
      width: 100%;
      aspect-ratio: 1 / 1;
      object-fit: cover;
      display: block;
    }

    .img-placeholder {
      width: 100%;
      aspect-ratio: 1 / 1;
      background: #EDECEA;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .img-placeholder svg { width: 28%; height: 28%; opacity: 0.22; }

    .card-body { padding: 7px 8px 9px; }

    .card-name {
      font-size: 11px;
      font-weight: 500;
      color: var(--text-primary);
      margin-bottom: 4px;
      line-height: 1.4;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    @media (min-width: 768px) {
      .card-name { font-size: 12px; }
      .card-body { padding: 9px 10px 11px; }
    }

    .badge {
      display: inline-block;
      font-size: 10px;
      font-weight: 500;
      padding: 2px 7px;
      border-radius: 999px;
      line-height: 1.5;
    }
    .badge-done  { background: #E6F0DE; color: #3A6B12; }
    .badge-ready { background: #FEF0D6; color: #8A5010; }
    .badge-none  { background: #EBEBEB; color: #666460; }

    .empty {
      text-align: center;
      padding: 40px 0;
      color: var(--text-muted);
      font-size: 13px;
    }
  </style>
</head>

<header>

    <p class="site-title">핸든 제품 현황<span>Hendon</span></p>
  </div>
  <div class="filter-row-brand" id="brandGroup"></div>
  <div class="filter-row-status">

</header>

const STATUS_META = {
  '등록완료': { cls: 'badge-done',  label: '등록완료' },
  '등록예정': { cls: 'badge-ready', label: '등록예정(재고있음)' },
  '등록미정': { cls: 'badge-none',  label: '등록미정(재고없음)' },
};

/* 첫 화면 기본값: 데이세븐 + 등록완료 */
let activeBrand  = '데이세븐';
let activeStatus = '등록완료';

const brands = [...new Set(PRODUCTS.map(p => p.brand))];

/* 브랜드별 전체 집계 (상태 필터와 무관하게 항상 고정) */
function getBrandSummary(brand) {
  const base = brand === 'all' ? PRODUCTS : PRODUCTS.filter(p => p.brand === brand);
  return {
    total: base.length,
    done:  base.filter(p => p.status === '등록완료').length,
    ready: base.filter(p => p.status === '등록예정').length,
    none:  base.filter(p => p.status === '등록미정').length,
  };
}

/* 브랜드 칩 생성 */
const brandGroup = document.getElementById('brandGroup');
[{ val: 'all', label: '전체' }, ...brands.map(b => ({ val: b, label: b }))]
  .forEach(({ val, label }) => {
    const btn = document.createElement('button');
    btn.className = 'chip-brand' + (val === activeBrand ? ' active' : '');
    btn.dataset.brand = val;
    btn.textContent = label;
    brandGroup.appendChild(btn);
  });

brandGroup.addEventListener('click', e => {
  const chip = e.target.closest('[data-brand]');
  if (!chip) return;
  activeBrand = chip.dataset.brand;
  brandGroup.querySelectorAll('.chip-brand').forEach(c => c.classList.remove('active'));
  chip.classList.add('active');
  renderSummary();
  renderCards();
});

document.getElementById('statusGroup').addEventListener('click', e => {
  const chip = e.target.closest('[data-status]');
  if (!chip) return;
  activeStatus = chip.dataset.status;
  document.getElementById('statusGroup').querySelectorAll('.chip-status').forEach(c => c.classList.remove('active'));
  chip.classList.add('active');
  renderCards(); /* 요약 바는 건드리지 않음 */
});

/* 요약 바: 브랜드 기준 고정, 상태 필터 무관 */
function renderSummary() {
  const s = getBrandSummary(activeBrand);
  document.getElementById('summaryBar').innerHTML = `
    <div class="summary-item">
      <span class="summary-label">전체 제품</span>
      <span class="summary-count">${s.total}</span>
    </div>
    <div class="summary-item done">
      <span class="summary-label">등록완료</span>
      <span class="summary-count">${s.done}</span>
    </div>
    <div class="summary-item ready">
      <span class="summary-label">등록예정(재고있음)</span>
      <span class="summary-count">${s.ready}</span>
    </div>
    <div class="summary-item none">
      <span class="summary-label">등록미정(재고없음)</span>
      <span class="summary-count">${s.none}</span>
    </div>`;
}

function placeholder() {
  return `<div class="img-placeholder"><svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
    <rect x="3" y="3" width="18" height="18" rx="2" stroke="#888" stroke-width="1.2"/>
    <circle cx="8.5" cy="8.5" r="1.5" fill="#888"/>
    <path d="M3 16l5-5 4 4 3-3 6 6" stroke="#888" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
  </svg></div>`;
}

function cardHTML(p) {
  const meta = STATUS_META[p.status] || STATUS_META['등록미정'];
  const img  = p.image
    ? `<img class="card-image" src="${p.image}" alt="${p.name}" loading="lazy" />`
    : placeholder();
  return `<div class="card">${img}<div class="card-body">
    <p class="card-name">${p.name}</p>
    <span class="badge ${meta.cls}">${meta.label}</span>
  </div></div>`;
}

function filtered() {
  return PRODUCTS.filter(p =>
    (activeBrand  === 'all' || p.brand  === activeBrand) &&
    (activeStatus === 'all' || p.status === activeStatus)
  );
}

function renderCards() {
  const mainEl = document.getElementById('main');

  if (activeBrand !== 'all') {
    const data = filtered();
    mainEl.innerHTML = data.length
      ? `<div class="product-grid">${data.map(cardHTML).join('')}</div>`
      : '<div class="empty">해당하는 제품이 없습니다</div>';
    return;
  }

  const html = brands.map(b => {
    const data = PRODUCTS.filter(p =>
      p.brand === b && (activeStatus === 'all' || p.status === activeStatus)
    );
    if (!data.length) return '';
    return `<div class="brand-section">
      <p class="brand-heading">${b}</p>
      <div class="product-grid">${data.map(cardHTML).join('')}</div>
    </div>`;
  }).join('');

  mainEl.innerHTML = html || '<div class="empty">해당하는 제품이 없습니다</div>';
}

renderSummary();
renderCards();
</script>
</body>
</html>
